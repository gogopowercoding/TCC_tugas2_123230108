<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <title>Notes</title>
  <style>
    body { font-family: sans-serif; background: #f0f0f0; margin: 0; padding: 30px 16px; }
    .card { background: #fff; border-radius: 8px; padding: 24px; max-width: 580px; margin: 0 auto; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    h2 { margin: 0 0 16px; font-size: 18px; }
    input, textarea { display: block; width: 100%; padding: 8px; margin-bottom: 8px; font-size: 14px; box-sizing: border-box; }
    textarea { height: 80px; }
    button { padding: 7px 16px; font-size: 13px; cursor: pointer; margin-right: 6px; }
    hr { margin: 16px 0; border: none; border-top: 1px solid #ddd; }
    .note { border-bottom: 1px solid #eee; padding: 10px 0; }
    .note:last-child { border-bottom: none; }
    .note h4 { margin: 0 0 4px; }
    .note p { margin: 0 0 8px; font-size: 13px; color: #444; }
    .top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="top">
      <h2>Notes</h2>
      <button onclick="logout()">Logout</button>
    </div>

    <input id="judul" placeholder="Judul"/>
    <textarea id="isi" placeholder="Isi catatan..."></textarea>
    <div>
      <button onclick="handleSave()" id="saveBtn">Simpan</button>
      <button onclick="cancelEdit()" id="cancelBtn" style="display:none">Batal</button>
    </div>

    <hr>
    <div id="notes"></div>
  </div>

  <script>
    const API = 'http://localhost:3000/api/notes';
    const user = JSON.parse(localStorage.getItem('user'));
    if (!user) window.location.href = 'login.html';

    let editId = null;

    async function loadNotes() {
      const res = await fetch(`${API}/user/${user.id}`);
      const data = await res.json();
      const container = document.getElementById('notes');
      container.innerHTML = '';
      data.forEach(note => {
        container.innerHTML += `
          <div class="note">
            <h4>${note.judul}</h4>
            <p>${new Date(note.tanggal_dibuat).toLocaleString()}</p>
            <p>${note.isi}</p>
            <button onclick="editNote(${note.id}, '${note.judul.replace(/'/g,"\\'")}', '${note.isi.replace(/'/g,"\\'")}')">Edit</button>
            <button onclick="deleteNote(${note.id})">Hapus</button>
          </div>`;
      });
    }

    async function handleSave() {
      const judul = document.getElementById('judul').value;
      const isi = document.getElementById('isi').value;
      if (editId) {
        await fetch(`${API}/${editId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ judul, isi })
        });
        cancelEdit();
      } else {
        await fetch(API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ judul, isi, user_id: user.id })
        });
        document.getElementById('judul').value = '';
        document.getElementById('isi').value = '';
      }
      loadNotes();
    }

    function editNote(id, judul, isi) {
      editId = id;
      document.getElementById('judul').value = judul;
      document.getElementById('isi').value = isi;
      document.getElementById('saveBtn').textContent = 'Update';
      document.getElementById('cancelBtn').style.display = 'inline';
    }

    function cancelEdit() {
      editId = null;
      document.getElementById('judul').value = '';
      document.getElementById('isi').value = '';
      document.getElementById('saveBtn').textContent = 'Simpan';
      document.getElementById('cancelBtn').style.display = 'none';
    }

    async function deleteNote(id) {
      if (confirm('Hapus catatan ini?')) {
        await fetch(`${API}/${id}`, { method: 'DELETE' });
        loadNotes();
      }
    }

    function logout() {
      localStorage.removeItem('user');
      window.location.href = 'login.html';
    }

    loadNotes();
  </script>
</body>
</html>
