<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <title>Register</title>
  <style>
    body { font-family: sans-serif; background: #f0f0f0; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .card { background: #fff; border-radius: 8px; padding: 32px; width: 300px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    h2 { margin: 0 0 20px; font-size: 18px; }
    input { display: block; width: 100%; padding: 8px; margin-bottom: 10px; font-size: 14px; box-sizing: border-box; }
    button { padding: 8px 20px; font-size: 14px; cursor: pointer; }
    p { margin-top: 14px; font-size: 13px; }
    .err { color: red; margin-top: 10px; font-size: 13px; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Register</h2>
    <input id="nama" placeholder="Nama"/>
    <input id="password" type="password" placeholder="Password"/>
    <button onclick="register()">Daftar</button>
    <p class="err" id="err"></p>
    <p>Sudah punya akun? <a href="login.html">Login</a></p>
  </div>

  <script>
    async function register() {
      const nama = document.getElementById('nama').value;
      const password = document.getElementById('password').value;
      const err = document.getElementById('err');
      err.textContent = '';

      try {
        const res = await fetch('http://localhost:3000/api/users', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nama, password })
        });
        const data = await res.json();
        if (res.ok) {
          window.location.href = 'login.html';
        } else {
          err.textContent = data.message || 'Gagal daftar.';
        }
      } catch (e) {
        err.textContent = 'Gagal terhubung ke server.';
      }
    }
  </script>
</body>
</html>
